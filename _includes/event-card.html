<div align="center" style="display: block; block; width: 100%; margin-bottom: 16px; [COLOR="#FF0000"]clear:both;[/COLOR]">


	<div class="github-component position-relative height-full text-center border border-gray-light rounded-1 bg-white p-5">
		<div>
			{% if topic.image_url01 %}
			  <img src="{{ topic.image_url01 }}" height="200">
			{% endif %}
			{% if topic.image_url02 %}
			  <img src="{{ topic.image_url02 }}" height="200" style="margin-left:15px">
			{% endif %}
		</div>
		<p class="f3 lh-condensed text-center link-gray-dark mb-0 mt-1">
			<a href="{{ topic.web_url }}">
				{{ topic.note }}
			</a>
		</p>
		<p class="f5 text-gray text-center mb-0 mt-1">
			{{ topic.location }}   {{ topic.time }}
		</p>
		<p class="f5 text-gray text-center mb-0 mt-1">
			{{ topic.description }}
		</p>
	</div>
	
</div>
